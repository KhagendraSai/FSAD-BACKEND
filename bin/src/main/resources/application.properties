spring.application.name=fsad-backend
server.port=8080

# MySQL configuration (override with environment variables when needed)
spring.datasource.url=jdbc:mysql://localhost:3306/fsad_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=4bxrcEUE@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
